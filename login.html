<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyTrack Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login">

    <div class="login-container">

        <div id="loginBox">
            <h1>MoneyTrack 💸</h1>

            <input type="email" id="email" placeholder="Email">
            <input type="password" id="senha" placeholder="Senha">

            <button onclick="fazerLogin()">Entrar</button>

            <p onclick="mostrarCadastro()" class="trocar">
                Criar conta
            </p>
        </div>

        <div id="cadastroBox">
            <h1>Criar Conta 💸</h1>

            <input type="text" id="nomeCadastro" placeholder="Nome">
            <input type="email" id="emailCadastro" placeholder="Email">
            <input type="password" id="senhaCadastro" placeholder="Senha">

            <button onclick="cadastrarNovoUsuario()">
                Cadastrar
            </button>

            <p onclick="mostrarLogin()" class="trocar">
                Já tenho conta
            </p>
        </div>

    </div>

    <div id="popup"></div>

    <script src="script.js"></script>

</body>
</html>
